upstream synapse {
    server synapse;
}

upstream matrix-media-repo {
    server matrix-media-repo;
}

server {
    listen       8080;
    # listen  [::]:8080;
    server_name  synapse-nginx;

    #root   /usr/share/nginx/html;
    root    /app;
    index  index.html;

    server_tokens off;

    #add the CORS header
    #add_header Access-Control-Allow-Origin $cors_header;

    #add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Content-Security-Policy "frame-ancestors 'self'";
    add_header X-Backend-Server $hostname;
    
    # Set no-cache for the version, config and index.html
    # so that browsers always check for a new copy of Element Web.
    # NB http://your-domain/ and http://your-domain/? are also covered by this

    location = /index.html {
        add_header Cache-Control "no-cache";
    }
    location = /version {
        add_header Cache-Control "no-cache";
    }
    # covers config.json and config.hostname.json requests as it is prefix.
    location /config {
        add_header Cache-Control "no-cache";
    }

    location /_matrix/media {
      if ($request_method = 'OPTIONS') {
        add_header 'Access-Control-Allow-Origin' '*';
        add_header 'Access-Control-Allow-Headers' 'Origin, X-Requested-With, Content-Type, Accept, Authorization, Date';
      }
      proxy_set_header Host synapse-internal;
      proxy_pass http://matrix-media-repo$request_uri;
    }

    # Redirect all traffic by default to the homeserver
    location / {
    #   proxy_set_header Host "chat-staging";
      proxy_pass http://synapse$request_uri;
    }

    # standard name for nginx-prometheus-exporter
    location = /metrics {
        vhost_traffic_status_bypass_limit on;
        vhost_traffic_status_bypass_stats on;
        vhost_traffic_status_display;
        vhost_traffic_status_display_format prometheus; 
    }

    location = /status {
        vhost_traffic_status_bypass_limit on;
        vhost_traffic_status_bypass_stats on;
        vhost_traffic_status_display;
        vhost_traffic_status_display_format html; 
    }

    # redirect server error pages to the static page /50x.html
    #
    error_page   500 502 503 504  /50x.html;
}

